name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Publish & Tag
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Check for publishable packages
        id: check
        run: |
          OUTPUT=$(pnpm changeset status --since=origin/main 2>&1 || true)
          if echo "$OUTPUT" | grep -q "No changesets present"; then
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        id: publish
        run: |
          pnpm changeset publish 2>&1 | tee /tmp/publish-output.txt
          TAGS=$(grep -oP 'New tag:\s+\K\S+' /tmp/publish-output.txt || true)
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$TAGS" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push tags
        if: steps.publish.outputs.published == 'true'
        run: git push --follow-tags

      - name: Get release version
        if: steps.publish.outputs.published == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.publish.outputs.published == 'true'
        id: notes
        run: |
          NOTES="## Published Packages\n\n"
          for pkg in packages/*/; do
            NAME=$(node -p "require('./${pkg}package.json').name")
            VER=$(node -p "require('./${pkg}package.json').version")
            PRIVATE=$(node -p "require('./${pkg}package.json').private || false")
            if [ "$PRIVATE" = "false" ]; then
              NOTES="$NOTES| [\`$NAME\`](https://www.npmjs.com/package/$NAME) | \`$VER\` |\n"
            fi
          done
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "| Package | Version |\n|---|---|\n$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --latest

      - name: Summary
        if: steps.publish.outputs.published == 'true'
        run: |
          echo "### Released v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.notes.outputs.notes }}" >> "$GITHUB_STEP_SUMMARY"

      - name: No release needed
        if: steps.publish.outputs.published == 'false'
        run: echo "No new versions to publish." >> "$GITHUB_STEP_SUMMARY"

  back-merge:
    name: Back-merge to develop
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit -m "chore: back-merge main into develop"
          git push origin develop
