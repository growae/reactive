name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Release type (auto = use changeset declarations)
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto
      dry_run:
        description: Preview version bumps without creating the branch
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    name: Create Release Branch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare changesets
        run: |
          BUMP="${{ inputs.bump }}"
          CHANGESETS=$(ls .changeset/*.md 2>/dev/null | grep -v README.md || true)

          if [ -z "$CHANGESETS" ] && [ "$BUMP" = "auto" ]; then
            echo "::error::No changesets found on develop and bump is set to 'auto'. Either add changesets or select a specific bump level (patch/minor/major)."
            exit 1
          fi

          if [ -z "$CHANGESETS" ]; then
            echo "No changesets found — generating a $BUMP release changeset for all public packages"
            HEADER="---"
            for pkg in packages/*/; do
              PRIVATE=$(node -p "require('./${pkg}package.json').private || false")
              if [ "$PRIVATE" = "false" ]; then
                NAME=$(node -p "require('./${pkg}package.json').name")
                HEADER="$HEADER
          \"$NAME\": $BUMP"
              fi
            done
            HEADER="$HEADER
          ---

          Release $BUMP bump"
            echo "$HEADER" > .changeset/release-bump.md
            echo "Generated .changeset/release-bump.md:"
            cat .changeset/release-bump.md
          elif [ "$BUMP" != "auto" ]; then
            echo "Overriding existing changesets to **$BUMP**"
            for file in .changeset/*.md; do
              [ "$(basename "$file")" = "README.md" ] && continue
              sed -i -E "s/: (patch|minor|major)/: $BUMP/g" "$file"
            done
            echo "Updated changesets:"
            for file in .changeset/*.md; do
              [ "$(basename "$file")" = "README.md" ] && continue
              echo "--- $file ---"
              cat "$file"
            done
          else
            echo "Using existing changesets as-is:"
            echo "$CHANGESETS"
          fi

      - name: Version packages
        run: pnpm changeset version

      - name: Get release version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/core/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Release version: v$VERSION" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate changelog summary
        id: changelog
        run: |
          SUMMARY=""
          for pkg in packages/*/; do
            NAME=$(node -p "require('./${pkg}package.json').name")
            VER=$(node -p "require('./${pkg}package.json').version")
            CHANGELOG="${pkg}CHANGELOG.md"
            if git diff --name-only | grep -q "$CHANGELOG"; then
              SUMMARY="$SUMMARY- **$NAME** → \`$VER\`\n"
            fi
          done
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Dry run summary
        if: inputs.dry_run
        run: |
          echo "### Dry Run — no branch created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Packages that would be released:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.changelog.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Changed files:" >> "$GITHUB_STEP_SUMMARY"
          git diff --name-only >> "$GITHUB_STEP_SUMMARY"

      - name: Create release branch
        if: ${{ !inputs.dry_run }}
        run: |
          BRANCH="release/v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: version packages for v${{ steps.version.outputs.version }}"
          git push origin "$BRANCH"

      - name: Create pull request
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_SUMMARY: ${{ steps.changelog.outputs.summary }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          BRANCH="release/$VERSION"
          cat > /tmp/pr-body.md <<EOF
          ## Release $VERSION

          This PR was auto-generated from \`develop\` by the **Create Release** workflow.

          ### Packages

          ${CHANGELOG_SUMMARY}

          ### Checklist

          - [ ] Changelog entries look correct
          - [ ] CI passes

          > Merging this PR will **publish all packages to npm** and **create a GitHub Release**.
          EOF
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Release $VERSION" \
            --label "release" \
            --body-file /tmp/pr-body.md

      - name: Summary
        if: ${{ !inputs.dry_run }}
        run: |
          echo "### Release branch created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: \`release/v${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.changelog.outputs.summary }}" >> "$GITHUB_STEP_SUMMARY"
